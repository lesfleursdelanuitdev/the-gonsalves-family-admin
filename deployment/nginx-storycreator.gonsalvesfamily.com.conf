# Reverse proxy for standalone StoryCreator host (same Next.js app on 127.0.0.1:3040)
#
# Install:
#   sudo cp deployment/nginx-storycreator.gonsalvesfamily.com.conf /etc/nginx/sites-available/storycreator.gonsalvesfamily.com
#   sudo ln -sf /etc/nginx/sites-available/storycreator.gonsalvesfamily.com /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# TLS: point DNS A/AAAA at this host, then e.g.
#   sudo certbot --nginx -d storycreator.gonsalvesfamily.com

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    listen [::]:80;
    server_name storycreator.gonsalvesfamily.com;

    location /.well-known/acme-challenge/ {
        root /var/www/html;
        allow all;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name storycreator.gonsalvesfamily.com;

    ssl_certificate     /etc/letsencrypt/live/storycreator.gonsalvesfamily.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/storycreator.gonsalvesfamily.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    access_log /var/log/nginx/storycreator.gonsalvesfamily.com.access.log;
    error_log  /var/log/nginx/storycreator.gonsalvesfamily.com.error.log;

    client_max_body_size 128M;

    location / {
        proxy_pass http://127.0.0.1:3040;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}

